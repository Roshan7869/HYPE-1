<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPE — Select Size</title>
<link rel="stylesheet" href="styles.css">
<style>
.sizepage{flex:1;background:var(--sand)}
.crumb2{background:#fff}
.crumb2__inner{max-width:var(--maxw);margin:0 auto;padding:20px 48px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.crumb2__inner svg{width:15px;height:15px}
.crumb2 .sep{opacity:.4;font-weight:400}
.crumb2 .cur{color:#5c564c;font-weight:500}

.sz__inner{max-width:var(--maxw);margin:0 auto;padding:46px 48px 70px;display:grid;grid-template-columns:1fr 1.05fr;gap:56px;align-items:start}
.sz__title{font-family:var(--font-disp);font-weight:800;font-size:42px;line-height:1.04;letter-spacing:-.02em;margin-bottom:26px}
.sz__img{aspect-ratio:1/.92;border-radius:18px;background:linear-gradient(150deg,#dfe3e8,#c2b9ac);display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.32);font-family:var(--font-disp);font-weight:700;font-size:16px}

.sz__h{font-family:var(--font-disp);font-weight:800;font-size:34px;letter-spacing:-.01em;margin-bottom:22px}
.sz__tabs{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.sz__tabs .hb{font-size:15px;color:#5c564c;margin-right:6px}
.sz__tab{border:none;background:#e4dccd;border-radius:999px;padding:11px 22px;font-weight:600;font-size:14px;color:#5c564c}
.sz__tab.on{background:var(--ink);color:#fff}
.sz__grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.szc{background:var(--cream);border-radius:12px;padding:22px 10px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:.15s}
.szc:hover{border-color:var(--ink)}
.szc b{display:block;font-weight:700;font-size:16px;margin-bottom:6px}
.szc .pr{font-size:14px;font-weight:600;color:var(--green-ink)}
.szc .ask{font-size:14px;color:#a39a8c}

.sz__actions{grid-column:1/-1;display:flex;justify-content:space-between;margin-top:46px}

@media (max-width:1000px){.sz__inner{grid-template-columns:1fr}.sz__grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="page">

<header class="nav">
  <div class="nav__inner">
    <a href="index.html" class="logo">HYPE.</a>
    <nav class="nav__links">
      <a href="index.html">HOME</a>
      <a href="shop.html">SHOP</a>
      <a href="live-auctions.html">LIVE AUCTIONS</a>
      <a href="sell-with-us.html">SELL WITH US</a>
      <a href="#">ABOUT</a>
      <a href="#">CONTACT</a>
    </nav>
    <div class="nav__cta">
      <a href="#" class="btn btn--ghost">LOGIN</a>
      <a href="#" class="btn btn--light">SIGN UP</a>
    </div>
  </div>
</header>

<div class="crumb2"><div class="crumb2__inner">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
  <a href="create-listing-details.html">Create listing</a><span class="sep">/</span><span class="cur">Nike Shox Z Calistra</span>
</div></div>

<main class="sizepage">
  <div class="sz__inner">
    <div>
      <h1 class="sz__title">Nike Shox Z Calistra<br>Pale Ivory Oatmeal (Women's)</h1>
      <div class="sz__img">Nike Shox Z Calistra</div>
    </div>

    <div>
      <h2 class="sz__h">Select Size</h2>
      <div class="sz__tabs">
        <span class="hb">Highest Bids</span>
        <button class="sz__tab on">US W</button>
        <button class="sz__tab">US M</button>
        <button class="sz__tab">UK</button>
        <button class="sz__tab">CM</button>
        <button class="sz__tab">KR</button>
        <button class="sz__tab">EU</button>
      </div>
      <div class="sz__grid" id="szgrid"></div>
    </div>

    <div class="sz__actions">
      <a href="create-listing-details.html" class="btn btn--outline btn--lg">Cancel</a>
      <a href="#" class="btn btn--dark btn--lg">Next step →</a>
    </div>
  </div>
</main>

<div id="footer"></div>
</div>

<script>
const SZ=[
  ["5",null],["5.5","₹5,700"],["6","₹5,350"],["6.5","₹5,350"],
  ["7","₹950"],["7.5","₹4,300"],["8","₹5,900"],["8.5","₹7,100"],
  ["9","₹6,700"],["9.5","₹5,900"],["10",null],["10.5",null],
  ["11",null],["11.5",null],["12",null],["12.5",null],
  ["13",null],["14",null],
];
document.getElementById('szgrid').innerHTML=SZ.map(([s,p])=>`
  <div class="szc"><b>US W ${s}</b>${p?`<span class="pr">${p}</span>`:'<span class="ask">Ask</span>'}</div>`).join('');
</script>
<script src="footer.js"></script>
</body>
</html>
